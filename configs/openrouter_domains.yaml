# Cross-DOMAIN probe via OpenRouter (factual_qa; domain is the only varied factor).
#
# Same adversarial task structure across four domains — technical / medical / legal /
# finance — so a k-sweep shows whether the evidence-saturation point k* is stable across
# domains or moves with them. A deliberately rough probe on small models.
#
#   export OPENROUTER_API_KEY=sk-or-...
#   evidence-k run --config configs/openrouter_domains.yaml

model:
  provider: openai_compatible
  name: openai/gpt-4o-mini
  temperature: 0
  max_tokens: 512
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY

benchmark:
  k_values: [0, 1, 2, 3, 5, 8, 13, "full"]
  repetitions: 2
  random_seed: 42

tasks:
  - name: domain_technical
    dataset: data/domains/technical.jsonl
  - name: domain_medical
    dataset: data/domains/medical.jsonl
  - name: domain_legal
    dataset: data/domains/legal.jsonl
  - name: domain_finance
    dataset: data/domains/finance.jsonl

scoring:
  weights:
    correctness: 0.35
    grounding: 0.20
    constraint_adherence: 0.20
    state_consistency: 0.15
    hallucination_penalty: 0.10
    cost_penalty: 0.00
